# ──────────────────────────────────────────────────────────────────────────────
# StarRate – Cypress E2E Container
# Läuft auf: donkeykong  (docker compose -f docker/cypress.yml up)
#
# Voraussetzungen auf donkeykong:
#   - docker + docker compose installiert
#   - Dieses Repository geklont unter /opt/starrate  (oder beliebiger Pfad)
#   - docker/cypress.env angelegt (Kopie von docker/cypress.env.example)
# ──────────────────────────────────────────────────────────────────────────────

services:

  cypress:
    image: cypress/included:13.17.0
    container_name: starrate-cypress
    working_dir: /e2e

    # Repo-Root ins /e2e-Verzeichnis mounten
    volumes:
      - ..:/e2e

    # Credentials aus .env-Datei lesen (nie committen!)
    env_file:
      - cypress.env

    environment:
      # Kein Sandbox-Problem in Docker (Linux-Container auf Windows-Host)
      ELECTRON_EXTRA_LAUNCH_ARGS: "--no-sandbox"
      # Cypress findet Node in PATH
      NODE_PATH: /usr/local/lib/node_modules

    # Network-Namespace mit nc-nightly4 teilen → Cypress erreicht NC unter http://localhost (Port 80).
    # Vermeidet host.docker.internal/Port-8180-Forwarding-Probleme zwischen Compose-Default-Net und
    # dem bridge-Default-Netz, in dem nc-nightly4 läuft.
    network_mode: "container:nc-nightly4"

    # Ergebnisse landen im gemounteten Repo-Ordner
    # tests/results/cypress/screenshots & videos

    # Container entfernt sich nach dem Lauf automatisch
    restart: "no"
