# ──────────────────────────────────────────────────────────────────────────────
# StarRate – Nextcloud 34 Testinstanz  (Hub 26 Spring)
# Läuft auf: donkeykong  (docker compose -f docker/nc34.yml up -d)
#
# WICHTIG – einmaliger Image-Pull:
#   Das Image `nextcloud:34` muss EINMAL INTERAKTIV (RDP/Konsole) auf donkeykong
#   gepullt werden:   docker pull nextcloud:34
#   Grund: über SSH (Network-Logon) crasht der Docker-Desktop-Credential-Helper
#   ("A specified logon session does not exist") — `pull` ruft ihn immer auf, auch
#   für öffentliche Images. `compose up` braucht den Pull nicht, wenn das Image
#   bereits lokal vorliegt → danach läuft alles per SSH.
#
# Erster Start:
#   docker compose -f docker/nc34.yml up -d
#   # Warten bis NC initialisiert (~30 Sekunden)
#   docker compose -f docker/nc34.yml exec --user www-data nc34 php occ app:enable starrate
#
# Danach erreichbar unter: http://localhost:8190
# Login: admin / admin
#
# App aktualisieren (nach Code-Änderungen):
#   docker compose -f docker/nc34.yml exec --user www-data nc34 php occ upgrade
#   # ACHTUNG Opcache: wenn die gebuggte Version vorher schon ausgeführt wurde,
#   # hält der Opcache den alten Bytecode → `docker restart starrate-nc34` flusht.
#
# Instanz stoppen und Daten löschen (Reset):
#   docker compose -f docker/nc34.yml down -v
# ──────────────────────────────────────────────────────────────────────────────

services:

  nc34:
    image: nextcloud:34
    container_name: starrate-nc34
    ports:
      - "8190:80"

    environment:
      # Auto-Install beim ersten Start (kein Web-Wizard nötig)
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      # SQLite – kein DB-Container nötig für Tests
      SQLITE_DATABASE: nextcloud

    volumes:
      # NC-Daten persistent (Config, DB, Uploads)
      - nc34_data:/var/www/html

    restart: unless-stopped

volumes:
  nc34_data:
