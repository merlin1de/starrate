name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS bundle
        run: npm run build

      - name: Install Composer dependencies (no-dev)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create release archive
        run: |
          mkdir -p dist
          # GitHub-Actions-Checkout: Repo-Root IS die nextcloud/ App.
          # --transform wandelt ./foo → starrate/foo um.
          tar \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./.claude' \
            --exclude='./.gitignore' \
            --exclude='./.npmrc' \
            --exclude='./.env*' \
            --exclude='./node_modules' \
            --exclude='./vendor/bin' \
            --exclude='./tests' \
            --exclude='./src' \
            --exclude='./docker' \
            --exclude='./docs' \
            --exclude='./screenshots' \
            --exclude='./dist' \
            --exclude='./build' \
            --exclude='./*.cy.js' \
            --exclude='./*.spec.js' \
            --exclude='./*.stackdump' \
            --exclude='./*.ico' \
            --exclude='./CLAUDE.md' \
            --exclude='./README.md' \
            --exclude='./Makefile' \
            --exclude='./cypress.config.cjs' \
            --exclude='./vite.config.js' \
            --exclude='./vitest.config.js' \
            --exclude='./phpunit.xml' \
            --exclude='./composer.json' \
            --exclude='./composer.lock' \
            --exclude='./package.json' \
            --exclude='./package-lock.json' \
            --transform 's|^\./|starrate/|' \
            --transform 's|^\.$|starrate|' \
            -czf dist/starrate.tar.gz \
            .

      - name: Verify archive structure
        run: |
          echo "=== Top-level directories ==="
          tar -tzf dist/starrate.tar.gz | grep -v '/' | head -5
          echo "=== All paths (first 40) ==="
          tar -tzf dist/starrate.tar.gz | head -40
          echo "=== vendor/ contents ==="
          tar -tzf dist/starrate.tar.gz | grep '^starrate/vendor/' | head -20

      - name: Create GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/starrate.tar.gz
          generate_release_notes: true

      - name: Upload to Nextcloud App Store
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/starrate.tar.gz"
          echo "Uploading: $DOWNLOAD_URL"
          HTTP_STATUS=$(curl -s -o /tmp/appstore_response.json -w "%{http_code}" \
            -X POST https://apps.nextcloud.com/api/v1/apps/releases/ \
            -H "Authorization: Token ${{ secrets.NC_APP_STORE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"download\": \"$DOWNLOAD_URL\"}")
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/appstore_response.json
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "App Store upload successful."
          else
            echo "App Store upload failed with status $HTTP_STATUS"
            exit 1
          fi
