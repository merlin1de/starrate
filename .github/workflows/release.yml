name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  # ── Build & Package ──────────────────────────────────────────────────────────
  build:
    name: Build package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS bundle
        run: npm run build

      - name: Install Composer dependencies (no-dev)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create release archive
        run: |
          mkdir -p dist
          tar \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./.claude' \
            --exclude='./.gitignore' \
            --exclude='./.npmrc' \
            --exclude='./.env*' \
            --exclude='./node_modules' \
            --exclude='./vendor/bin' \
            --exclude='./tests' \
            --exclude='./src' \
            --exclude='./docker' \
            --exclude='./docs' \
            --exclude='./screenshots' \
            --exclude='./dist' \
            --exclude='./build' \
            --exclude='./*.cy.js' \
            --exclude='./*.spec.js' \
            --exclude='./*.stackdump' \
            --exclude='./*.ico' \
            --exclude='./CLAUDE.md' \
            --exclude='./README.md' \
            --exclude='./Makefile' \
            --exclude='./cypress.config.cjs' \
            --exclude='./vite.config.js' \
            --exclude='./vitest.config.js' \
            --exclude='./phpunit.xml' \
            --exclude='./composer.json' \
            --exclude='./composer.lock' \
            --exclude='./package.json' \
            --exclude='./package-lock.json' \
            --transform 's|^\./|starrate/|' \
            --transform 's|^\.$|starrate|' \
            -czf dist/starrate.tar.gz \
            .

      - name: Verify archive contains required files
        run: |
          echo "Checking required files..."
          tar -tzf dist/starrate.tar.gz | grep -q 'starrate/vendor/autoload.php' \
            && echo "  ✓ vendor/autoload.php" \
            || (echo "  ✗ vendor/autoload.php MISSING" && exit 1)
          tar -tzf dist/starrate.tar.gz | grep -q 'starrate/vendor/composer/autoload_psr4.php' \
            && echo "  ✓ vendor/composer/autoload_psr4.php" \
            || (echo "  ✗ autoload_psr4.php MISSING" && exit 1)
          tar -tzf dist/starrate.tar.gz | grep -q 'starrate/appinfo/info.xml' \
            && echo "  ✓ appinfo/info.xml" \
            || (echo "  ✗ appinfo/info.xml MISSING" && exit 1)
          echo "All required files present ✓"

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: starrate-package
          path: dist/starrate.tar.gz
          retention-days: 1

  # ── Install test (NC 33) ─────────────────────────────────────────────────────
  install-test:
    name: Install test (NC 33)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Start Nextcloud 33
        run: |
          docker run -d --name nc33 \
            -p 8080:80 \
            -e NEXTCLOUD_ADMIN_USER=admin \
            -e NEXTCLOUD_ADMIN_PASSWORD=admin \
            -e NEXTCLOUD_TRUSTED_DOMAINS=localhost \
            -e SQLITE_DATABASE=nextcloud \
            nextcloud:33
          echo "Waiting for Nextcloud to initialize (up to 90s)..."
          for i in $(seq 1 18); do
            sleep 5
            STATUS=$(curl -sf http://localhost:8080/status.php 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('installed',''))" 2>/dev/null || echo "")
            echo "  Attempt $i: installed=$STATUS"
            [ "$STATUS" = "True" ] && echo "Nextcloud ready ✓" && break
            [ "$i" = "18" ] && echo "Timeout waiting for NC" && exit 1
          done

      - name: Download archive artifact
        uses: actions/download-artifact@v4
        with:
          name: starrate-package

      - name: Install app into Nextcloud
        run: |
          tar -xzf starrate.tar.gz -C /tmp/
          docker cp /tmp/starrate nc33:/var/www/html/custom_apps/

      - name: Enable app and verify version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          RESULT=$(docker exec -u www-data nc33 php occ app:enable starrate 2>&1)
          echo "$RESULT"
          # occ prints "starrate X.Y.Z enabled" on success
          echo "$RESULT" | grep -q "enabled" || (echo "App enable failed!" && exit 1)
          echo "$RESULT" | grep -q "$TAG_VERSION" \
            && echo "Version $TAG_VERSION confirmed ✓" \
            || echo "Warning: could not confirm version $TAG_VERSION in output (non-fatal)"

      - name: Smoke test — no PHP fatal errors
        run: |
          # occ app:check triggers app initialization — any autoloader or
          # namespace error would appear here as a PHP fatal
          RESULT=$(docker exec -u www-data nc33 php occ app:check starrate 2>&1 || true)
          echo "$RESULT"
          echo "$RESULT" | grep -qiE "fatal|Uncaught|class.*not found|namespace" \
            && (echo "Fatal PHP error detected!" && exit 1) \
            || echo "No fatal PHP errors ✓"
          # Confirm app is still listed as enabled
          docker exec -u www-data nc33 php occ app:list --enabled 2>&1 \
            | grep -q "starrate" \
            && echo "App enabled ✓" \
            || (echo "App missing from enabled list!" && exit 1)

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: install-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download archive artifact
        uses: actions/download-artifact@v4
        with:
          name: starrate-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: starrate.tar.gz
          generate_release_notes: true

  # ── Nextcloud App Store ──────────────────────────────────────────────────────
  appstore:
    name: Nextcloud App Store
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Upload to Nextcloud App Store
        env:
          NC_APP_STORE_TOKEN: ${{ secrets.NC_APP_STORE_TOKEN }}
        run: |
          if [ -z "$NC_APP_STORE_TOKEN" ]; then
            echo "NC_APP_STORE_TOKEN not set — skipping App Store upload."
            echo "To enable: add NC_APP_STORE_TOKEN as a GitHub repository secret."
            exit 0
          fi
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/starrate.tar.gz"
          echo "Uploading: $DOWNLOAD_URL"
          HTTP_STATUS=$(curl -s -o /tmp/appstore_response.json -w "%{http_code}" \
            -X POST https://apps.nextcloud.com/api/v1/apps/releases/ \
            -H "Authorization: Token $NC_APP_STORE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"download\": \"$DOWNLOAD_URL\"}")
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/appstore_response.json
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "App Store upload successful ✓"
          else
            echo "App Store upload failed with status $HTTP_STATUS"
            exit 1
          fi
