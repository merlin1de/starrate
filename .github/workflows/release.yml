name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install JS dependencies
        run: npm ci

      - name: Build JS bundle
        run: npm run build

      - name: Install Composer dependencies (no-dev)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create release archive
        run: |
          mkdir -p dist
          # Archiv von Parent-Dir: nextcloud/ → starrate/ im Tarball
          cd ..
          tar \
            --exclude='nextcloud/.git' \
            --exclude='nextcloud/.github' \
            --exclude='nextcloud/.claude' \
            --exclude='nextcloud/.gitignore' \
            --exclude='nextcloud/.npmrc' \
            --exclude='nextcloud/.env*' \
            --exclude='nextcloud/node_modules' \
            --exclude='nextcloud/vendor/bin' \
            --exclude='nextcloud/tests' \
            --exclude='nextcloud/src' \
            --exclude='nextcloud/docker' \
            --exclude='nextcloud/docs' \
            --exclude='nextcloud/screenshots' \
            --exclude='nextcloud/dist' \
            --exclude='nextcloud/build' \
            --exclude='nextcloud/*.cy.js' \
            --exclude='nextcloud/*.spec.js' \
            --exclude='nextcloud/*.stackdump' \
            --exclude='nextcloud/*.ico' \
            --exclude='nextcloud/CLAUDE.md' \
            --exclude='nextcloud/README.md' \
            --exclude='nextcloud/Makefile' \
            --exclude='nextcloud/cypress.config.cjs' \
            --exclude='nextcloud/vite.config.js' \
            --exclude='nextcloud/vitest.config.js' \
            --exclude='nextcloud/phpunit.xml' \
            --exclude='nextcloud/composer.json' \
            --exclude='nextcloud/composer.lock' \
            --exclude='nextcloud/package.json' \
            --exclude='nextcloud/package-lock.json' \
            --transform 's|^nextcloud|starrate|' \
            -czf nextcloud/dist/starrate.tar.gz \
            nextcloud/
          cd nextcloud

      - name: Verify archive structure
        run: |
          echo "=== Top-level directories ==="
          tar -tzf dist/starrate.tar.gz | grep -v '/' | head -5
          echo "=== All paths (first 40) ==="
          tar -tzf dist/starrate.tar.gz | head -40
          echo "=== vendor/ contents ==="
          tar -tzf dist/starrate.tar.gz | grep '^starrate/vendor/' | head -20

      - name: Create GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/starrate.tar.gz
          generate_release_notes: true

      - name: Upload to Nextcloud App Store
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/starrate.tar.gz"
          echo "Uploading: $DOWNLOAD_URL"
          HTTP_STATUS=$(curl -s -o /tmp/appstore_response.json -w "%{http_code}" \
            -X POST https://apps.nextcloud.com/api/v1/apps/releases/ \
            -H "Authorization: Token ${{ secrets.NC_APP_STORE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"download\": \"$DOWNLOAD_URL\"}")
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/appstore_response.json
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "App Store upload successful."
          else
            echo "App Store upload failed with status $HTTP_STATUS"
            exit 1
          fi
