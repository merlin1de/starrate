name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── JavaScript: Vitest ──────────────────────────────────────────────────────
  js:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Vitest
        run: npm run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: tests/results/junit-js.xml
          retention-days: 14

  # ── PHP: PHPUnit ───────────────────────────────────────────────────────────
  php:
    name: PHP ${{ matrix.php }} (PHPUnit)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.3']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-results-${{ matrix.php }}
          path: tests/results/junit.xml
          retention-days: 14
